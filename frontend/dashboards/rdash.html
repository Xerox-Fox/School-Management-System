<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Root Dashboard</title>

<link rel="stylesheet" href="rdash.css">
<link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.1/css/boxicons.min.css">
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
.content-page { display:none; }
.content-page.active { display:block; }
.nav-link a.active { background:#203791; color:white; }
</style>
</head>

<body>

<!-- SIDEBAR -->
<nav class="sidebar close">
<header>
    <div class="image-text">
        <img src="../images/lccs.png" width="40">
        <div>
            <div class="name">LCCS</div>
            <div class="role">Root</div>
        </div>
    </div>
</header>

<ul class="menu-links">

<li class="nav-link"><a href="#home">Dashboard</a></li>
<li class="nav-link"><a href="#users">Users</a></li>
<li class="nav-link"><a href="#post">Post</a></li>
<li class="nav-link"><a href="#report">Reports</a></li>
<li class="nav-link"><a href="#analytics">Analytics</a></li>

</ul>
</nav>

<!-- MAIN -->
<main class="main-content">

<!-- HOME -->
<div id="home" class="content-page active">

<h2>Dashboard Overview</h2>

<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:15px">

<div style="background:#203791;color:white;padding:20px;border-radius:10px">
<h3>Total Students</h3>
<p id="students">120</p>
</div>

<div style="background:white;padding:20px;border-radius:10px">
<h3>Teachers</h3>
<p id="teachers">25</p>
</div>

<div style="background:white;padding:20px;border-radius:10px">
<h3>Reports</h3>
<p id="reports">8</p>
</div>

</div>

</div>

<!-- USERS -->
<div id="users" class="content-page">

<h2>Users (Demo)</h2>

<div id="userTable"></div>

</div>

<!-- POST -->
<div id="post" class="content-page">
<h2>Post News</h2>
<input placeholder="Title">
<textarea placeholder="Content"></textarea>
<button>Post</button>
</div>

<!-- REPORT -->
<div id="report" class="content-page">
<h2>Reports</h2>
<p>Demo reports section</p>
</div>

<!-- ANALYTICS -->
<div id="analytics" class="content-page">

<h2>Analytics</h2>
<canvas id="chart"></canvas>

</div>

</main>

<!-- SCRIPT -->
<script>
import { users } from "../js/auth.js";
import { getPosts } from "../js/posts.js";

// stats
document.getElementById("dashStudentCount").innerText =
users.filter(u => u.role === "student").length;

document.getElementById("dashTeacherCount").innerText =
users.filter(u => u.role === "teacher").length;

// users table (ADD TABLE ID in HTML!)
document.getElementById("usersTable").innerHTML =
users.map(u => `
<tr>
  <td>${u.name}</td>
  <td>${u.email}</td>
  <td>${u.role}</td>
</tr>
`).join("");

// news
document.getElementById("newsBox").innerHTML =
getPosts().map(p => `
<div class="post-card">
  <h3>${p.title}</h3>
  <p>${p.content}</p>
</div>
`).join("");
</script>

</body>
</html>
