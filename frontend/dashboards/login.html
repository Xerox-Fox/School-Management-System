<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login">
        <div class="login-card">
            <center>
            <img src="../images/lccs.png" class="logo">
            <h2>Welcome Back</h2>
            <p>Please enter your details to login</p>

            <form id="loginForm">
                <input type="email" id="email" placeholder="Email" required>
                <br>

                <input type="password" id="pass" placeholder="Password" required>
                <br>

                <div class="terms-container">
                    <input type="checkbox" required>
                    <label>I agree to Terms</label>
                </div>

                <br>

                <button type="submit" class="btn-primary">Login</button>
            </form>
            <form id="loginForm">
                <input type="email" id="email" placeholder="Email" required>
                <br>
                <input type="password" id="password" placeholder="Password" required>
                <br>
                <div class="terms-container">
                    <input type="checkbox" required>
                    <label>I agree to Terms</label>
                </div>
                <br>
                <button type="submit">Login</button>
            </form>

            </center>
        </div>
    </div>

<script type="module">
import { login } from "./js/auth.js";

document.getElementById("loginForm").addEventListener("submit", (e) => {
  e.preventDefault();

  try {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const user = login(email, password);

    if (user.role === "student") location.href = "./dashboards/sdash.html";
    if (user.role === "teacher") location.href = "./dashboards/tdash.html";
    if (user.role === "parent") location.href = "./dashboards/pdash.html";
    if (user.role === "root") location.href = "./dashboards/rdash.html";

  } catch (err) {
    alert(err.message);
  }
});
</script>

</body>
</html>
