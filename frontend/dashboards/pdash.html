<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parent Dashboard</title>

<link rel="stylesheet" href="pdash.css">
<link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.1/css/boxicons.min.css">
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet"/>

<style>
.content-page { display: none; }
.content-page.active { display: block; }
</style>
</head>

<body>

<!-- SIDEBAR -->
<nav class="sidebar close">

<header>
    <div class="image-text">
        <img src="../images/lccs.png" width="40">
        <div class="text">
            <span class="name" id="user-name">Parent</span>
            <span class="role">Parent</span>
        </div>
    </div>
</header>

<div class="menu-bar">

<ul class="menu-links">

<li class="nav-link active">
    <a href="#grades">
        <i class="ri-draft-line icon"></i>
        <span>Grades</span>
    </a>
</li>

<li class="nav-link">
    <a href="#notifications">
        <i class="ri-notification-line icon"></i>
        <span>Notifications</span>
    </a>
</li>

<li class="nav-link">
    <a href="#news">
        <i class="bx bx-news icon"></i>
        <span>News</span>
    </a>
</li>

</ul>

</div>
</nav>

<!-- MAIN -->
<main class="main-content">

<!-- NEWS -->
<div id="news" class="content-page active">

<div class="feed-container">
    <h2>School News</h2>
    <div id="news-posts-container"></div>
</div>

</div>

<!-- NOTIFICATIONS -->
<div id="notifications" class="content-page">

<h2>Notifications</h2>

<div id="notificationList" style="margin-top:20px; display:flex; flex-direction:column; gap:10px;">
<!-- JS injected -->
</div>

</div>

<!-- GRADES -->
<div id="grades" class="content-page">

<h2>Student Performance Overview</h2>

<!-- TOP CARDS -->
<div style="display:flex;gap:20px;margin-top:20px;margin-bottom:20px;">

<div style="flex:1;background:#203791;color:white;padding:20px;border-radius:12px;">
    <p>Average</p>
    <h2 id="averageMark">0.0</h2>
</div>

<div style="flex:1;background:#fff;padding:20px;border-radius:12px;">
    <p>Attendance</p>
    <h2>98%</h2>
</div>

</div>

<!-- TABLE -->
<div style="background:#fff;padding:20px;border-radius:12px;">

<table width="100%">
<thead>
<tr>
<th>Subject</th>
<th>Assessment</th>
<th>Exam</th>
<th>Total</th>
<th>Status</th>
</tr>
</thead>

<tbody id="gradesTableBody"></tbody>

</table>

</div>

</div>

</main>

<!-- NOTIFICATION POPUP -->
<div id="notification-window"
style="display:none; position:fixed; top:20px; right:20px; width:300px;
background:white; border-left:5px solid #203791;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
border-radius:8px; padding:15px; z-index:999;">

<div style="display:flex; justify-content:space-between;">
<h4 id="notif-title">Notification</h4>
<i class="bx bx-x" id="close-notif" style="cursor:pointer;"></i>
</div>

<p id="notif-message"></p>
<small id="notif-time"></small>

</div>

<script>
import { getGrades } from "../js/grades.js";
import { getPosts } from "../js/posts.js";

const grades = getGrades("student1");

// grades
document.getElementById("gradesTableBody").innerHTML =
grades.map(g => {
  const total = g.assessment + g.exam;
  return `
    <tr>
      <td>${g.subject}</td>
      <td>${g.assessment}</td>
      <td>${g.exam}</td>
      <td>${total}</td>
      <td>${total >= 50 ? "Pass" : "Fail"}</td>
    </tr>
  `;
}).join("");

// news
document.getElementById("news-posts-container").innerHTML =
getPosts().map(p => `
<div class="post-card">
  <h3>${p.title}</h3>
  <p>${p.content}</p>
</div>
`).join("");
</script>


</body>
</html>
