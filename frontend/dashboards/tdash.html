<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Dashboard</title>

<link rel="stylesheet" href="tdash.css">
<link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.1/css/boxicons.min.css">
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet"/>

<style>
.main-content > div { display: none; }
.main-content > div.active { display: block; }
</style>
</head>

<body>

<!-- SIDEBAR -->
<nav class="sidebar close">
<header>
    <div class="image-text">
        <span class="image">
            <img src="../images/lccs.png">
        </span>
        <div class="text header-text">
            <span class="name">Teacher 1</span>
            <span class="role">Teacher</span>
        </div>
    </div>
</header>

<div class="menu-bar">
    <ul class="menu-links">

        <li class="nav-link active">
            <a href="#attendance">
                <i class="bx bx-calendar-check icon"></i>
                <span class="text">Attendance</span>
            </a>
        </li>

        <li class="nav-link">
            <a href="#scores">
                <i class="ri-draft-line icon"></i>
                <span class="text">Scores</span>
            </a>
        </li>

    </ul>
</div>
</nav>

<!-- MAIN -->
<main class="main-content">

<!-- ATTENDANCE -->
<div id="attendance" class="active">

    <h2 class="text-title">Mark Attendance</h2>

    <div class="attendance-card">

        <p id="today"></p>

        <div style="display:flex; gap:10px;">
            <button onclick="markAttendance('Present')" class="btn-present">
                Present
            </button>

            <button onclick="markAttendance('Absent')" class="btn-absent">
                Absent
            </button>
        </div>

        <p id="msg"></p>

    </div>

    <h3>History</h3>
    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Status</th>
            </tr>
        </thead>

        <tbody id="table"></tbody>
    </table>

</div>

<!-- SCORES -->
<div id="scores">
    <h2>Add Scores</h2>

    <input placeholder="Student Name">
    <input placeholder="Assessment">
    <input placeholder="Exam">

    <button>Save</button>
</div>

</main>

<!-- SCRIPT -->
<script src="../js/attendance.js"></script>

<script>
import { getPosts } from "../js/posts.js";
import { getAttendance, markAttendance } from "../js/attendance.js";
import { getUser } from "../js/auth.js";

const user = getUser();
document.getElementById("user-name").innerText = user.name;

// attendance
const table = document.getElementById("attendanceTable");

function renderAttendance() {
  table.innerHTML = getAttendance().map(a => `
    <tr>
      <td>${a.date}</td>
      <td>${a.status}</td>
    </tr>
  `).join("");
}

renderAttendance();

window.markAttendance = (status) => {
  markAttendance(status);
  renderAttendance();
};

// news
document.getElementById("news-posts-container").innerHTML =
getPosts().map(p => `
<div class="post-card">
  <h3>${p.title}</h3>
  <p>${p.content}</p>
</div>
`).join("");
</script>

</body>
</html>
