<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard</title>

    <link rel="stylesheet" href="tdash.css">
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.1/css/boxicons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet"/>

    <style>
        .main-content > div {
            display: none;
        }
        .main-content > div.active {
            display: block;
        }
    </style>
</head>
<body>

<nav class="sidebar close">
    <header>
        <div class="image-text">
            <span class="image">
                <img src="../images/lccs.png">
            </span>
            <div class="text header-text">
                <span class="name" id="user-name">Teacher 1</span>
                <span class="role">Teacher</span>
            </div>
        </div>
        <i class="bx bx-chevron-right toggle"></i>
    </header>

    <div class="menu-bar">
        <div class="menu">
            <ul class="menu-links">

                <li class="nav-link active">
                    <a href="#attendance">
                        <i class="bx bx-calendar-check icon"></i>
                        <span class="text nav-text">Attendance</span>
                    </a>
                </li>

                <li class="nav-link">
                    <a href="#add-scores">
                        <i class="ri-draft-line icon"></i>
                        <span class="text nav-text">Add Scores</span>
                    </a>
                </li>

                <li class="nav-link">
                    <a href="#news">
                        <i class="bx bx-news icon"></i>
                        <span class="text nav-text">News Feed</span>
                    </a>
                </li>

            </ul>
        </div>

        <div class="bottom-content">
            <li class="nav-link">
                <a href="../Login/login.html">
                    <i class="bx bx-log-out icon"></i>
                    <span class="text nav-text">Logout</span>
                </a>
            </li>
        </div>
    </div>
</nav>

<main class="main-content">

    <!-- ================= ATTENDANCE ================= -->
    <div id="attendance" class="active">
        <div class="attendance-container">

            <h2 class="text-title">
                <i class="bx bx-calendar-check"></i> Mark Attendance
            </h2>

            <div class="attendance-card">
                <p class="attendance-date" id="todayDate"></p>

                <div class="attendance-buttons">
                    <button class="btn-present" onclick="markAttendance('Present')">
                        <i class="bx bx-check-circle"></i> Present
                    </button>

                    <button class="btn-absent" onclick="markAttendance('Absent')">
                        <i class="bx bx-x-circle"></i> Absent
                    </button>
                </div>

                <p id="attendanceStatusMsg" class="status-msg"></p>
            </div>

            <!-- HISTORY TABLE -->
            <div class="attendance-history">
                <h3>Attendance History</h3>

                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="attendanceTable">
                        <!-- Dummy data -->
                        <tr>
                            <td>2026-04-20</td>
                            <td class="present">Present</td>
                        </tr>
                        <tr>
                            <td>2026-04-19</td>
                            <td class="absent">Absent</td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>

    <!-- ================= SCORES ================= -->
    <div id="add-scores">
        <div class="form-card">
            <h3><i class="bx bx-edit"></i> Input Student Grades</h3>

            <form>
                <input type="text" placeholder="Student Name">
                <input type="number" placeholder="Assessment">
                <input type="number" placeholder="Exam">

                <button type="submit">Save Grade</button>
            </form>
        </div>
    </div>

    <!-- ================= NEWS ================= -->
    <div id="news">
        <div class="feed-container">
            <div class="post-card">
                <div class="post-header">
                    <div class="user-avatar">A</div>
                    <div class="post-info">
                        <span class="author-name">Admin</span>
                        <span class="post-date">Today</span>
                    </div>
                </div>

                <div class="post-content">
                    <h3>Welcome Teachers</h3>
                    <p>System is running in demo mode.</p>
                </div>
            </div>
        </div>
    </div>

</main>


<select id="status">
  <option>Present</option>
  <option>Absent</option>
</select>

<button onclick="mark()">Mark Attendance</button>

<script type="module">
import { markAttendance } from "../js/attendance.js";

window.mark = async () => {
  await markAttendance({
    teacher_id: "T1",
    teacher_name: "Teacher 1",
    status: document.getElementById("status").value
  });

  alert("Attendance saved");
};
</script>

</body>
</html>
