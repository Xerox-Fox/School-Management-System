<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard</title>

<link rel="stylesheet" href="sdash.css">
<link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.1/css/boxicons.min.css">
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet"/>

<style>
.content-page { display: none; }
.content-page.active { display: block; }
</style>
</head>

<body>

<!-- SIDEBAR -->
<nav class="sidebar close">

<header>
    <div class="image-text">
        <img src="../images/lccs.png" width="40">
        <div class="text">
            <span class="name" id="user-name">Student</span>
            <span class="role">Student</span>
        </div>
    </div>
</header>

<div class="menu-bar">

<ul class="menu-links">

<li class="nav-link active">
    <a href="#grades">
        <i class="ri-draft-line icon"></i>
        <span>Grades</span>
    </a>
</li>

<li class="nav-link">
    <a href="#news">
        <i class="bx bx-news icon"></i>
        <span>News</span>
    </a>
</li>

</ul>

</div>
</nav>

<!-- MAIN -->
<main class="main-content">

<!-- NEWS -->
<div id="news" class="content-page active">

<div class="feed-container">
    <h2>School News</h2>

    <div id="news-posts-container"></div>
</div>

</div>

<!-- GRADES -->
<div id="grades" class="content-page">

<h2>My Academic Records</h2>

<!-- TOP STATS -->
<div style="display:flex;gap:20px;margin-top:20px;">

<div style="flex:1;background:#203791;color:white;padding:20px;border-radius:12px;">
    <p>Average</p>
    <h2 id="averageMark">0.0</h2>
</div>

<div style="flex:1;background:#fff;padding:20px;border-radius:12px;">
    <p>Attendance</p>
    <h2>98%</h2>
</div>

</div>

<!-- TABLE -->
<div style="margin-top:20px;background:#fff;padding:20px;border-radius:12px;">

<table width="100%">
<thead>
<tr>
<th>Subject</th>
<th>Assessment</th>
<th>Exam</th>
<th>Total</th>
<th>Status</th>
</tr>
</thead>

<tbody id="gradesTableBody">
<!-- filled by JS -->
</tbody>

</table>

</div>

</div>

</main>

<!-- SCRIPT -->
<script src="sdash.js"></script>

<script>
import { getGrades } from "../js/grades.js";
import { getPosts } from "../js/posts.js";
import { getUser } from "../js/auth.js";

const user = getUser();
const grades = getGrades("student1");

document.getElementById("user-name").innerText = user.name;

// grades table
const table = document.getElementById("gradesTableBody");

table.innerHTML = grades.map(g => {
  const total = g.assessment + g.exam;
  return `
    <tr>
      <td>${g.subject}</td>
      <td>${g.assessment}</td>
      <td>${g.exam}</td>
      <td>${total}</td>
      <td>${total >= 50 ? "Pass" : "Fail"}</td>
    </tr>
  `;
}).join("");

// average
const avg = grades.reduce((a,b)=>a+b.assessment+b.exam,0)/grades.length;
document.getElementById("averageMark").innerText = avg.toFixed(1);

// news
document.getElementById("news-posts-container").innerHTML =
getPosts().map(p => `
<div class="post-card">
  <h3>${p.title}</h3>
  <p>${p.content}</p>
</div>
`).join("");
</script>

</body>
</html>
