<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard</title>
    <link rel="stylesheet" href="tdash.css">
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.1/css/boxicons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet"/>
    <style>
        /* Essential for your JS navigation to work */
        .main-content > div {
            display: none;
        }
        .main-content > div.active {
            display: block;
        }
    </style>
</head>
<body>
    <nav class="sidebar close">
        <header>
            <div class="image-text">
                <span class="image">
                    <img src="../images/lccs.png" alt="Logo">
                </span>
                <div class="text header-text">
                    <span class="name" id="user-name">Loading...</span>
                    <span class="role" id="user-role">Teacher</span>
                </div>
            </div>
            <i class="bx bx-chevron-right toggle"></i>
        </header>

        <div class="menu-bar">
            <div class="menu">
                <ul class="menu-links">
                    <li class="nav-link active">
                        <a href="#add-scores">
                            <i class="ri-draft-line icon"></i>
                            <span class="text nav-text">Add Scores</span>
                        </a>
                    </li>
                    <li class="nav-link">
                        <a href="#news">
                            <i class="bx bx-news icon"></i>
                            <span class="text nav-text">News Feed</span>
                        </a>
                    </li>
                </ul>
            </div>
            <div class="bottom-content">
                <li class="nav-link">
                    <a href="../Login/login.html">
                        <i class="bx bx-log-out icon"></i>
                        <span class="text nav-text">Logout</span>
                    </a>
                </li>
            </div>
        </div>
    </nav>

    <main class="main-content">

        <div id="news" class="active">
            <div class="feed-container" style="padding: 20px 60px;">
                <div id="news-posts-container"></div>
            </div>
        </div>

        <div id="add-scores">
            <div style="padding: 20px 60px;">
                <div id="scoreArea" style="max-width: 600px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.06);">
                    <h3 style="color: #203791; margin-bottom: 5px;"><i class="bx bx-edit"></i> Input Student Grades</h3>
                    <p style="margin-bottom: 25px; color: #707070; font-size: 0.9rem;">
                        Grading for: <span id="teacher-subject-display" style="color: #203791; font-weight: bold;">Loading...</span>
                    </p>
                    
                    <form id="gradeForm">
                        <div style="margin-bottom: 15px;">
                            <label style="display: block; margin-bottom: 5px; color: #707070;">Select Student</label>
                            <select id="studentSelect" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; outline: none;">
                                <option value="" disabled selected>Loading students...</option>
                            </select>
                        </div>

                        <div style="margin-bottom: 15px;">
                            <label style="display: block; margin-bottom: 5px; color: #707070;">Semester</label>
                            <select id="semesterSelect" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; outline: none;">
                                <option value="1">Semester 1</option>
                                <option value="2">Semester 2</option>
                            </select>
                        </div>

                        <div style="display: flex; gap: 15px; margin-bottom: 20px;">
                            <div style="flex: 1;">
                                <label style="display: block; margin-bottom: 5px; color: #707070;">Assessment (40)</label>
                                <input type="number" id="assessMark" min="0" max="40" step="0.1" placeholder="0.0" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; outline: none;">
                            </div>
                            <div style="flex: 1;">
                                <label style="display: block; margin-bottom: 5px; color: #707070;">Exam (60)</label>
                                <input type="number" id="examMark" min="0" max="60" step="0.1" placeholder="0.0" required style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; outline: none;">
                            </div>
                        </div>

                        <button type="submit" class="btn-primary" style="width: 100%; padding: 15px; background: #203791; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: background 0.3s;">
                            Save Grade
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="tdash.js"></script>
</body>
</html>
