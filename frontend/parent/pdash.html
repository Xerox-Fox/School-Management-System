<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Dashboard</title>
    <link rel="stylesheet" href="pdash.css">
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.1/css/boxicons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet"/>
</head>
<body>
    <nav class="sidebar close">
    <header>
        <div class="image-text">
            <span class="image">
                <img src="../images/lccs.png" alt="Logo">
            </span>
            <div class="text header-text">
                <span class="name" id="user-name">Loading...</span>
                <span class="role" id="user-role">Student</span>
            </div>
        </div>
        <i class="bx bx-chevron-right toggle"></i>
    </header>

    <div class="menu-bar">
        <div class="menu">
            <ul class="menu-links">
                <li class="nav-link active">
                        <a href="#grades">
                            <i class="ri-draft-line icon"></i>
                            <span class="text nav-text">Grades</span>
                        </a>
                </li>
                <li class="nav-link">
                        <a href="#notification-window">
                            <i class="ri-notification-line icon"></i>
                            <span class="text nav-text">Notifications</span>
                        </a>
                </li>
                <li class="nav-link">
                    <a href="#news">
                        <i class="bx bx-news icon"></i>
                        <span class="text nav-text">News Feed</span>
                    </a>
                </li>
            </ul>
        </div>
        <div class="bottom-content">
            <li class="nav-link">
                <a href="../Login/login.html">
                    <i class="bx bx-log-out icon"></i>
                    <span class="text nav-text">Logout</span>
                </a>
            </li>
        </div>
        </div>
    </nav>

    <main class="main-content">
    <div id="news" class="active">
        <div class="feed-container">
            <div id="news-posts-container"></div>
        </div>
    </div>

        <div id="notification-window" style="display: none; position: fixed; top: 20px; right: 20px; width: 320px; background: white; border-left: 5px solid #203791; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-radius: 8px; z-index: 1000; padding: 15px; animation: slideIn 0.5s ease;">
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <h4 id="notif-title" style="margin: 0; color: #203791; font-size: 1rem;">New Report</h4>
                <i class="bx bx-x" id="close-notif" style="cursor: pointer; color: #707070;"></i>
            </div>
            <p id="notif-message" style="margin: 10px 0; color: #555; font-size: 0.85rem; line-height: 1.4;"></p>
            <small id="notif-time" style="color: #aaa; font-size: 0.7rem;"></small>
        </div>

        <style>
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        </style>

        <div class="content-page" id="grades">
    <div class="text">Academic Records Of Your Child</div>
    
    <div style="display: flex; gap: 20px; margin-top: 20px; margin-bottom: 20px;">
        <div style="flex: 1; background: linear-gradient(135deg, #203791, #4C6EF5); color: white; padding: 25px; border-radius: 16px; box-shadow: 0 10px 20px rgba(32, 55, 145, 0.2);">
            <p style="opacity: 0.9; font-size: 0.9rem; margin-bottom: 5px;">Current Average</p>
            <h1 id="averageMark" style="font-size: 2.5rem;">0.0</h1>
        </div>
        <div style="flex: 2; background: #fff; padding: 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: space-around;">
            <div style="text-align: center;">
                <p style="color: #707070; font-size: 0.8rem;">Rank in Class</p>
                <h3 style="color: #203791;">--</h3>
            </div>
            <div style="text-align: center;">
                <p style="color: #707070; font-size: 0.8rem;">Attendance</p>
                <h3 style="color: #203791;">98%</h3>
            </div>
        </div>
    </div>

    <div style="background: #fff; padding: 20px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);">
        <table style="width: 100%; border-collapse: collapse; text-align: left;">
            <thead>
                <tr style="border-bottom: 2px solid #f0f0f0; color: #707070; font-size: 0.9rem;">
                    <th style="padding: 15px 10px;">Subject</th>
                    <th style="padding: 15px 10px;">Assessment (40%)</th>
                    <th style="padding: 15px 10px;">Exam (60%)</th>
                    <th style="padding: 15px 10px;">Total</th>
                    <th style="padding: 15px 10px;">Status</th>
                </tr>
            </thead>
            <tbody id="gradesTableBody">
                </tbody>
        </table>
        </div>
    </div>
    </main>
    <script src="pdash.js"></script>
</body>
</html>
